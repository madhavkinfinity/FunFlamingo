<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#a9c6e8" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Jetpack Flamingo" />
    <title>Jetpack Flamingo</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" href="icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="icon.svg" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="hud-top">
        <h1>Jetpack Flamingo</h1>
        <p>Tap or click to fire the jetpack</p>
      </header>

      <section class="game-wrap" aria-label="Game area">
        <canvas id="game" width="900" height="600" aria-label="Jetpack Flamingo game canvas"></canvas>

        <div id="splash" class="overlay splash visible" role="dialog" aria-live="polite">
          <div class="title-banner" role="img" aria-label="Jetpack Flamingo decorative title banner">
            <span>Jetpack Flamingo</span>
          </div>
          <div class="splash-mark" aria-hidden="true">
            <img src="icon.svg" alt="" />
          </div>
          <p>Ignite your jetpack and weave across frozen peaks.</p>
          <button id="splashStartBtn" type="button">Tap To Start</button>
        </div>

        <div id="menu" class="overlay" role="dialog" aria-live="polite">
          <h2>Jetpack Ready</h2>
          <p>Use quick taps to hover through icy crystal towers.</p>
          <button id="startBtn" type="button">Start</button>
        </div>

        <div id="gameover" class="overlay" role="dialog" aria-live="polite">
          <h2>Jetpack Flamingo</h2>
          <p id="finalScore">Score: 0</p>
          <p id="bestScore">Best: 0</p>
          <button id="restartBtn" type="button">Play Again</button>
        </div>

        <div class="score-card" aria-live="polite">
          <span>Score</span>
          <strong id="score">0</strong>
        </div>

        <button id="fullscreenBtn" class="fullscreen-btn" type="button" aria-label="Toggle fullscreen">Fullscreen</button>
      </section>
    </main>

    <script type="module" src="game.js"></script>
  </body>
</html>
