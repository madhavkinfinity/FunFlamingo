<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#c8dfd5" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Fun Flamingo" />
    <title>Fun Flamingo</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" href="icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="icon.svg" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="hud-top">
        <h1>Fun Flamingo</h1>
        <p>Tap, click, or press Space to flap</p>
      </header>

      <section class="game-wrap" aria-label="Game area">
        <canvas id="game" width="900" height="600" aria-label="Fun Flamingo game canvas"></canvas>

        <div id="splash" class="overlay splash visible" role="dialog" aria-live="polite">
          <div class="title-banner" role="img" aria-label="Fun Flamingo decorative title banner">
            <span>Fun Flamingo</span>
          </div>
          <div class="splash-mark" aria-hidden="true">
            <span class="splash-ring"></span>
            <span class="splash-dot"></span>
          </div>
          <p>Float through painted currents in a Monet-inspired pond.</p>
          <button id="splashStartBtn" type="button">Tap To Start</button>
        </div>

        <div id="menu" class="overlay" role="dialog" aria-live="polite">
          <h2>Flamingo In The Current</h2>
          <p>Ride watercolor fields and thread painted reeds.</p>
          <button id="startBtn" type="button">Start</button>
        </div>

        <div id="gameover" class="overlay" role="dialog" aria-live="polite">
          <h2>Fun Flamingo</h2>
          <p id="finalScore">Score: 0</p>
          <p id="bestScore">Best: 0</p>
          <button id="restartBtn" type="button">Play Again</button>
        </div>

        <div class="score-card" aria-live="polite">
          <span>Score</span>
          <strong id="score">0</strong>
        </div>

        <button id="fullscreenBtn" class="fullscreen-btn" type="button" aria-label="Toggle fullscreen">Fullscreen</button>
      </section>
    </main>

    <script src="game.js"></script>
  </body>
</html>
