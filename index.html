<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Watercolor Flappy</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="hud-top">
        <h1>Watercolor Flappy</h1>
        <p>Tap, click, or press Space to fly</p>
      </header>

      <section class="game-wrap" aria-label="Game area">
        <canvas id="game" width="900" height="600" aria-label="Watercolor bird game"></canvas>

        <div id="menu" class="overlay visible" role="dialog" aria-live="polite">
          <h2>Impressionist Flight</h2>
          <p>Guide the bird through painted reeds.</p>
          <button id="startBtn" type="button">Start</button>
        </div>

        <div id="gameover" class="overlay" role="dialog" aria-live="polite">
          <h2>Canvas Fallen</h2>
          <p id="finalScore">Score: 0</p>
          <p id="bestScore">Best: 0</p>
          <button id="restartBtn" type="button">Play Again</button>
        </div>

        <div class="score-card" aria-live="polite">
          <span>Score</span>
          <strong id="score">0</strong>
        </div>
      </section>
    </main>

    <script src="game.js"></script>
  </body>
</html>
